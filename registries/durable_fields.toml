# =============================================================================
# durable_fields.toml — the normative per-field cross-index (all identity classes)
# =============================================================================
# Bead: fgdb-g0-identity-registries-hrx
# Provenance: plan §5.1 (lines 292, 328, 338).
#
# One row per canonical field or union arm. Appendix pseudo-schemas are
# checked renderings of THIS table, not permission to infer a type from an
# English name: every apparent root, ref, OID, digest, Raft pointer, floor
# inventory, backup closure, or union element must have an explicit row.
# **A field absent from this table is unencodable.** This table is the sole
# input to generated reachability/GC, checkpoint-vector, backup-closure,
# construction-DAG, compatibility, size-limit, and fuzz walkers.
#
# Field row:
#   containing_schema     name resolving in one identity-class registry
#   field_tag             u16, permanent/reserved rule as codes
#   stable_name
#   exact_wire_type       builtin scalar (u16 u32 u64 i64 bool bytes string
#                         digest256 oid256) | wire_types.toml row |
#                         [[reference_union]] name. Bare "StrongRef" REQUIRES
#                         a concrete target_schema_id; a polymorphic target
#                         requires a generated reference union — bare
#                         StrongRef<A|B>, StrongRef[], slash-separated
#                         pseudo-types, or generic RegisteredStrongRef are
#                         invalid in normative bytes.
#   cardinality           one | optional | many
#   identity_class        scalar | inline | logical | physical | bootstrap_local
#   reference_semantics   none | strong | conditional | weak_digest | locator
#                         (strong/conditional targets MUST be logical rows;
#                          weak_digest/locator are nonretaining)
#   target_schema_id      required for strong/conditional/weak_digest/locator
#                         with a concrete target
#   construction_order    must equal the containing schema's ordinal class
#   role_predicate        activation predicate
#   retention_and_cut_rule
#   version_status        active | reserved | retired | experimental
#   max_size_bytes
#
# Digest rows additionally declare exactly one class (never by naming
# convention):
#   digest_class          target | transcript | weak_identity | body
#   transcript_recipe     (transcript rows) the registered recipe
#   bd_domain_separator / bd_schema_major / bd_included_field_tags /
#   bd_excluded_field_tags / recipe_pin  (body rows)
# BodyDigest default recipe: BLAKE3(domain_separator ‖ canonical(schema_major,
# T excluding exactly the one BodyDigest field)). Empty included list means
# "all fields except the excluded tags". Unknown exclusions, two body-digest
# fields in one schema, implicit zero placeholders, or self-including
# computation are G0 errors. `recipe_pin` is an FNV-64 drift pin over the
# canonical recipe transcript — a CI diffability pin, NOT the identity law
# (the identity law is the BLAKE3 recipe, implemented by w1-generated-parsers).
#
# Reference unions: generated per containing schema and role; every arm names
# exactly one registered top-level logical target.
# =============================================================================

schema_version = 1

[registry]
name = "durable_fields"
registry_epoch = 1

