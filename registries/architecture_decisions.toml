[[profile]]
id = "FG-ADR-PROFILE-CONSTITUTIONAL"
rationale = "The thesis and constitutional constraints are product contracts, not optional implementation suggestions."
assumptions = ["The comprehensive plan remains the architectural source of truth."]
no_claim_boundary = ["A frozen decision is not evidence that its implementation or gate is complete."]
verification_strategy = ["Check exact source coverage, stable IDs, owner closure, and references to claim registries."]
negative_evidence_triggers = ["Missing source item", "Broadened claim", "Unowned constitutional decision"]
review_policy = "Review on every normative plan change; time-sensitive supporting facts require fresh external verification before alteration."
reviewed_at = "2026-07-21"
review_after = "on-source-change"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-FOUNDATION-CONSUME"
rationale = "Consume an audited foundation capability without reimplementing it inside fgdb crates."
assumptions = ["The pinned foundation version retains the named capability and passes its own verification contract."]
no_claim_boundary = ["Availability of a primitive does not prove FrankenGraphDB integration safety or database-level semantics."]
verification_strategy = ["Pin the foundation revision, compile the integration, and run database-specific differential and fault tests."]
negative_evidence_triggers = ["Foundation API drift", "Unpinned transitive behavior", "Database safety inferred only by analogy"]
review_policy = "Review on foundation revision changes and before promoting an integration checker to live."
reviewed_at = "2026-07-21"
review_after = "on-foundation-revision"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-UPSTREAM-PREREQUISITE"
rationale = "The desired integration requires an explicit upstream interface or platform capability before the associated claim is legal."
assumptions = ["The prerequisite can be version-pinned and tested without a compatibility shim."]
no_claim_boundary = ["The dependent feature remains absent until the prerequisite and its integration checker are live."]
verification_strategy = ["Reject feature activation when the pinned prerequisite symbol or behavior is unavailable."]
negative_evidence_triggers = ["Fallback copy path mislabeled zero-copy", "Feature activated before prerequisite", "Compatibility shim hides drift"]
review_policy = "Review when the upstream capability lands or changes."
reviewed_at = "2026-07-21"
review_after = "on-upstream-change"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-DESIGN-DONOR"
rationale = "Adopt or adapt a design lesson while re-proving it for graph objects, authorization, durability, and the declared failure model."
assumptions = ["The cited design is accurately characterized by the frozen source record."]
no_claim_boundary = ["A donor result is not inherited correctness, performance, or proof for FrankenGraphDB."]
verification_strategy = ["Implement the local contract and verify it against reference, simulation, fault, and benchmark gates as applicable."]
negative_evidence_triggers = ["Correctness claimed by analogy", "Unpriced adaptation", "Missing fallback or scope"]
review_policy = "Review when the local contract or cited design scope changes."
reviewed_at = "2026-07-21"
review_after = "on-contract-change"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-BUILD-IN-HOUSE"
rationale = "The closed dependency universe requires a graph-specific implementation owned by the planned fgdb crate topology."
assumptions = ["The §18 crate universe remains closed and sufficient for the feature."
]
no_claim_boundary = ["A registry row or crate name does not imply the implementation exists or meets its gate."
]
verification_strategy = ["Require an owned bead, Cargo boundary checks, semantic tests, and the feature's declared gate evidence."
]
negative_evidence_triggers = ["External unapproved dependency", "Prose-only feature", "Implementation outside planned ownership"]
review_policy = "Review with §18 topology changes and when owner work is split or reassigned."
reviewed_at = "2026-07-21"
review_after = "on-topology-change"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-REJECTION"
rationale = "Preserve an evaluated rejection so a later simplification cannot silently reintroduce the discarded architecture."
assumptions = ["The stated product constraints and failure model remain in force."]
no_claim_boundary = ["Rejection does not claim the alternative is universally inferior outside this system's contract."]
verification_strategy = ["Lint dependencies, formats, and implementation topology for the rejected mechanism; retain explicit reopening criteria where declared."
]
negative_evidence_triggers = ["Rejected dependency or lane appears", "Rejection reason disappears", "Alternative is reopened without evidence"]
review_policy = "Review only through an explicit architecture-decision update with new evidence."
reviewed_at = "2026-07-21"
review_after = "on-explicit-reopening"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-MODEL-QUALIFIED"
rationale = "Use a statistical, mathematical, or control result only under its named assumptions and deterministic fallback."
assumptions = ["The applicable filtration, model, support, workload, or stability conditions are registered and tested."
]
no_claim_boundary = ["Statistical or model-qualified evidence is never an invariant or semantic safety proof."
]
verification_strategy = ["Register evidence class, assumptions, diagnostics, fallback, and empirical calibration before policy promotion."
]
negative_evidence_triggers = ["Claim-class escalation", "Missing assumption diagnostics", "Learned policy without deterministic fallback"]
review_policy = "Review on estimator, controller, workload, or evidence-schema changes."
reviewed_at = "2026-07-21"
review_after = "2027-07-21"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

[[profile]]
id = "FG-ADR-PROFILE-RESEARCH-CITATION"
rationale = "Retain a distinct research, system, standard, benchmark, or market anchor for provenance and future review."
assumptions = ["The citation label is a faithful normalization of the frozen Appendix E text."
]
no_claim_boundary = ["This row is neither a runtime dependency nor proof that a cited result transfers to FrankenGraphDB."]
verification_strategy = ["Check one-to-one Appendix E coverage, stable semantic IDs, and prohibition from runtime dependency closure."
]
negative_evidence_triggers = ["Citation promoted to dependency", "Distinct anchor collapsed", "Time-sensitive claim updated without external review"]
review_policy = "Source-preservation review only; externally re-verify time-sensitive claims before modification or promotion."
reviewed_at = "2026-07-21"
review_after = "before-claim-update-or-2027-07-21"
check_command = "cargo run -p registry-check --bin architecture-check -- --root ."

