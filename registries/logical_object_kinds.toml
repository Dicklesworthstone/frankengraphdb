# =============================================================================
# logical_object_kinds.toml — identity class 1: content-addressed logical objects
# =============================================================================
# Bead: fgdb-g0-identity-registries-hrx
# Provenance: plan §5.1 (identity classes, lines 282–298); Appendix A.
#
# Each row assigns one stable, NONREUSABLE `object_kind: u16` to one top-level
# canonical plaintext schema whose independent identity is the keyed
#   ObjectId = BLAKE3_keyed(K_oid, "fgdb:logical:v1" ‖ DatabaseSecurityNamespaceId
#                            ‖ canonical_plaintext_header ‖ canonical_plaintext_payload).
# All StrongRef<T>/Conditional*Ref<T>/weak-digest TARGETS must resolve to rows
# here — never to a physical record, bootstrap frame, or prebootstrap artifact.
#
# Code space (shared law for all five class registries):
#   0x0000 / 0xffff        permanently invalid
#   0x0001 ..= 0x7fff      permanent core assignments
#   0x8000 ..= 0xbfff      negotiated extension assignments
#   0xc000 ..= 0xfffe      test/experimental — production registries REJECT
# A released code changes status to "retired" but is never reassigned.
# `registry_epoch` changes only when rows are added or retired.
#
# Row fields:
#   object_kind          u16 code (hex)
#   name                 the top-level canonical plaintext schema
#   status               active | reserved | retired | experimental
#                        ("reserved": identity is fixed now, schema payload
#                         lands with its owning bead — W12 kinds and
#                         role-tagged variants reserve here per §19 G0)
#   construction_order   ordinal class: a schema may STRONG/CONDITIONAL-
#                        reference only schemas with construction_order <= its
#                        own (every strong value must already be known; a
#                        future applied result is never referenceable — the
#                        construction-DAG checker enforces this)
#   role_predicate       activation-predicate over roles/postures/features
#   max_size_bytes       resource bound on the canonical encoding
#   golden_corpus        reserved corpus path (populated by w1-format-test-corpora)
#
# Reference fields and digest recipes live ONLY in durable_fields.toml (the
# single cross-index — no second source of truth); a kind's field set is the
# set of durable_fields rows naming it as containing_schema.
#
# Downstream population: beads fgdb-a01..a21 add the full Appendix A catalog;
# fgdb-g0-command-contracts layers command/state registries on these classes.
# =============================================================================

